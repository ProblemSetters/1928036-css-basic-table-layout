<!DOCTYPE html>
<html>
<head>
    <title>Basic Table Layout</title>
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/h8k-design@latest/dist/index.css"
    rel="stylesheet"
  />
  <link
    rel="shortcut icon"
    href="https://cdn.jsdelivr.net/npm/h8k-design@latest/dist/assets/favicon.ico"
  />
  <script
    src="https://cdn.jsdelivr.net/npm/h8k-components/dist/h8k-components/h8k-components.esm.js"
    type="module"
  ></script>
  <script
    nomodule
    src="https://cdn.jsdelivr.net/npm/h8k-components/dist/h8k-components/h8k-components.js"
  ></script>
</head>

<body>
<!--HTML content goes here-->
<h8k-navbar header="Basic Table Layout"></h8k-navbar>

<main>
  <table>
    <thead class="table-heading">
        <tr>
            <th class="table-cell">Name</th>
            <th class="table-cell">Subject</th>
            <th class="table-cell">Score</th>
        </tr>
    </thead>
    <tbody class="table-body">
      <tr>
        <td class="table-cell">Alex</td>
        <td class="table-cell">Math</td>
        <td class="table-cell">85</td>
      </tr>
      <tr>
        <td class="table-cell">Chris</td>
        <td class="table-cell">Science</td>
        <td class="table-cell">90</td>
      </tr>
      <tr>
        <td class="table-cell">Sam</td>
        <td class="table-cell">History</td>
        <td class="table-cell">78</td>
      </tr>
      <tr>
        <td class="table-cell">Charlie</td>
        <td class="table-cell">English</td>
        <td class="table-cell">88</td>
      </tr>
      <tr>
        <td class="table-cell">Cameron</td>
        <td class="table-cell">Art</td>
        <td class="table-cell">92</td>
      </tr>
    </tbody>
  </table>
 </main>

</body>

</html>
